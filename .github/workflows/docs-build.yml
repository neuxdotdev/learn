name: Build and Deploy mdBook

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache mdBook binary
        id: cache-mdbook
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook
          key: ${{ runner.os }}-mdbook-v0.5.2

      - name: Install mdBook (binary)
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: |
          # Download dan ekstrak binary mdBook versi terbaru (misal v0.5.2)
          curl -L https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz | tar xz
          mkdir -p ~/.cargo/bin
          mv mdbook ~/.cargo/bin/

      - name: Add to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build documentation
        run: mdbook build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
